# Fragment for ~/.codex/config.toml — merge these tables into your existing config.
# Codex serves HTTP MCP over its streamable_http transport natively (no extra flag
# needed on current builds). Static headers use the `http_headers` key.

[mcp_servers.nixos]
command = "nix"
args = ["run", "github:utensils/mcp-nixos", "--"]

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"

[mcp_servers.context7.http_headers]
CONTEXT7_API_KEY = "YOUR_CONTEXT7_API_KEY"

[mcp_servers.microsoft-learn]
url = "https://learn.microsoft.com/api/mcp"
