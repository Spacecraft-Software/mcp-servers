# Fragment for ~/.codex/config.toml — merge these tables into your existing config.
# Codex serves HTTP MCP over its streamable_http transport natively (no extra flag
# needed on current builds). Static remote headers use the `http_headers` key; stdio
# server env vars use the `env` key.

[mcp_servers.nixos]
command = "nix"
args = ["run", "github:utensils/mcp-nixos", "--"]

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"

[mcp_servers.context7.http_headers]
CONTEXT7_API_KEY = "YOUR_CONTEXT7_API_KEY"

[mcp_servers.microsoft-learn]
url = "https://learn.microsoft.com/api/mcp"



[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/spacecraft-software"]

[mcp_servers.fetch]
command = "uvx"
args = ["mcp-server-fetch"]

[mcp_servers.engram]
command = "engram"
args = ["--db", "/home/mj/.gemini/engram.db", "mcp"]

[mcp_servers.brave-search]
command = "npx"
args = ["-y", "@brave/brave-search-mcp-server"]

[mcp_servers.brave-search.env]
BRAVE_API_KEY = "YOUR_BRAVE_API_KEY"

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.perplexity]
command = "npx"
args = ["-y", "perplexity-mcp"]

[mcp_servers.perplexity.env]
PERPLEXITY_API_KEY = "YOUR_PERPLEXITY_API_KEY"

[mcp_servers.crates]
command = "crates-mcp"
