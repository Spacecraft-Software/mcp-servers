# Fragment for ~/.codex/config.toml — merge these tables into your existing config.
# Codex serves HTTP MCP over its streamable_http transport natively (no extra flag
# needed on current builds). Static remote headers use the `http_headers` key; stdio
# server env vars use the `env` key.

[mcp_servers.nixos]
command = "nix"
args = ["run", "github:utensils/mcp-nixos", "--"]

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"

[mcp_servers.context7.http_headers]
CONTEXT7_API_KEY = "YOUR_CONTEXT7_API_KEY"

[mcp_servers.microsoft-learn]
url = "https://learn.microsoft.com/api/mcp"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"

[mcp_servers.github.http_headers]
Authorization = "Bearer YOUR_GITHUB_PAT"

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/path/to/your/workspace"]

[mcp_servers.fetch]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-fetch"]

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]

[mcp_servers.brave-search]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-brave-search"]

[mcp_servers.brave-search.env]
BRAVE_API_KEY = "YOUR_BRAVE_API_KEY"

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
