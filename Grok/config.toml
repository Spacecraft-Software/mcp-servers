# Fragment for ~/.grok/config.toml — merge these tables into your existing config.
# Grok keys static remote headers under `[mcp_servers.<name>.headers]`; stdio server
# env vars under `[mcp_servers.<name>.env]`.

[mcp_servers.nixos]
command = "nix"
args = ["run", "github:utensils/mcp-nixos", "--"]
enabled = true

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"
enabled = true

[mcp_servers.context7.headers]
CONTEXT7_API_KEY = "YOUR_CONTEXT7_API_KEY"

[mcp_servers.microsoft-learn]
url = "https://learn.microsoft.com/api/mcp"
enabled = true

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
enabled = true

[mcp_servers.github.headers]
Authorization = "Bearer YOUR_GITHUB_PAT"

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/spacecraft-software"]
enabled = true

[mcp_servers.fetch]
command = "uvx"
args = ["mcp-server-fetch"]
enabled = true

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]
enabled = false

[mcp_servers.engram]
command = "engram"
args = ["--db", "/home/mj/.gemini/engram.db", "mcp"]
enabled = true

[mcp_servers.brave-search]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-brave-search"]
enabled = true

[mcp_servers.brave-search.env]
BRAVE_API_KEY = "YOUR_BRAVE_API_KEY"

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
enabled = true

[mcp_servers.crates]
command = "crates-mcp"
enabled = true
